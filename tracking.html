<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tracking & Analysis</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<nav>
    <h1>Tracking & Analysis</h1>

    <div class="nav-links">
        <a href="index.html">Mission Control</a>
        <a href="tracking.html">Tracking & Analysis</a>
    </div>
</nav>

<div class="container">

    <div class="panel">
        <h2>GPS Information</h2>

        <div class="gps-grid">

            <div class="card">
                <h3>Latitude</h3>
                <p>XX.XXXX</p>
            </div>

            <div class="card">
                <h3>Longitude</h3>
                <p>XX.XXXX</p>
            </div>

            <div class="card">
                <h3>Satellites</h3>
                <p>XX</p>
            </div>

            <div class="card">
                <h3>Fix Type</h3>
                <p>3D</p>
            </div>

        </div>
    </div>

    <div class="panel">
        <h2>Live Tracking Map</h2>

        <div class="map-placeholder">
            MAP PLACEHOLDER
        </div>
    </div>

    <div class="panel">
        <h2>Altitude vs Time</h2>

        <div class="graph-placeholder">
            ALTITUDE GRAPH
        </div>
    </div>

    <div class="panel">
        <h2>Velocity vs Time</h2>

        <div class="graph-placeholder">
            VELOCITY GRAPH
        </div>
    </div>

    <div class="panel">
        <h2>Acceleration vs Time</h2>

        <div class="graph-placeholder">
            ACCELERATION GRAPH
        </div>
    </div>

</div>

</body>
</html>
